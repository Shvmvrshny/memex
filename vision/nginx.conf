server {
    listen 5173;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the memex backend
    location /memories {
        proxy_pass http://memex:8765;
    }
    location /trace {
        proxy_pass http://memex:8765;
    }
    location /facts {
        proxy_pass http://memex:8765;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
